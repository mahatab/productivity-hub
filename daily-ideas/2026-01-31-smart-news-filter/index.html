<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart News Filter - m2labs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .tagline {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-style: italic;
        }
        
        .interests {
            margin-bottom: 30px;
        }
        
        .interests h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .interest-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }
        
        .interest-btn {
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
            text-align: center;
        }
        
        .interest-btn:hover {
            background: #e8e8e8;
        }
        
        .interest-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            transform: scale(1.05);
        }
        
        .feed-container {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }
        
        .news-item {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }
        
        .news-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .news-item h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        
        .news-item p {
            color: #666;
            line-height: 1.6;
            font-size: 0.95em;
        }
        
        .news-item .category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-top: 10px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-state .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📰 Smart News Filter</h1>
        <p class="tagline">Less noise. More clarity. Only what matters to you.</p>
        
        <div class="interests">
            <h2>🎯 Select Your Interests:</h2>
            <div class="interest-grid">
                <button class="interest-btn" data-category="tech">💻 Tech</button>
                <button class="interest-btn" data-category="sports">⚽ Sports</button>
                <button class="interest-btn" data-category="world">🌍 World</button>
                <button class="interest-btn" data-category="business">💼 Business</button>
                <button class="interest-btn" data-category="science">🔬 Science</button>
                <button class="interest-btn" data-category="entertainment">🎬 Entertainment</button>
            </div>
        </div>
        
        <div class="feed-container">
            <h2 style="color: #333; margin-bottom: 20px;">📋 Your Personalized Feed</h2>
            <div id="feed">
                <div class="empty-state">
                    <div class="emoji">🤔</div>
                    <p>Select your interests above to see relevant news!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const newsData = {
            tech: [
                { title: "AI Transforms Daily Workflows", content: "New AI tools are making everyday tasks 10x faster, with focus on simplicity and user experience.", source: "TechCrunch" },
                { title: "Minimalist App Design Trend Grows", content: "Users increasingly prefer apps with fewer features but better UX, aligning with the 'less is more' philosophy.", source: "Wired" }
            ],
            sports: [
                { title: "Premier League Weekend Highlights", content: "Arsenal faces Leeds in a crucial match today, while Brighton takes on Everton in morning fixtures.", source: "BBC Sport" },
                { title: "Cricket World Cup Preparations Begin", content: "Teams gear up for the T20 World Cup 2026 with venue discussions ongoing.", source: "ESPN Cricket" }
            ],
            world: [
                { title: "Mine Collapse in DR Congo Claims 200+ Lives", content: "Tragic incident follows heavy rains, local authorities confirm rescue operations underway.", source: "BBC" },
                { title: "Bangladesh Elections Face Challenges", content: "Security concerns and AI misuse emerge as key issues ahead of upcoming polls.", source: "Reuters" }
            ],
            business: [
                { title: "Startup Focus Shifts to Simplicity", content: "New wave of businesses prioritize solving one problem really well over feature bloat.", source: "Forbes" },
                { title: "Tech Funding Returns to Fundamentals", content: "Investors now favor sustainable growth over rapid expansion.", source: "Bloomberg" }
            ],
            science: [
                { title: "New Study on Productivity and Focus", content: "Research shows single-task apps increase user satisfaction by 67%.", source: "Nature" },
                { title: "Climate Research Advances", content: "Scientists make breakthrough in renewable energy efficiency.", source: "Scientific American" }
            ],
            entertainment: [
                { title: "Catherine O'Hara Passes Away at 71", content: "The beloved Canadian actress and comedian died in Los Angeles following brief illness. Tributes pour in.", source: "BBC Entertainment" },
                { title: "Melania Documentary Sparks Discussion", content: "New film provides glimpse into first lady's life, directed by Brett Ratner.", source: "Hollywood Reporter" }
            ]
        };

        const buttons = document.querySelectorAll('.interest-btn');
        const feed = document.getElementById('feed');
        let selectedInterests = new Set();

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                const category = btn.dataset.category;
                btn.classList.toggle('active');
                
                if (selectedInterests.has(category)) {
                    selectedInterests.delete(category);
                } else {
                    selectedInterests.add(category);
                }
                
                updateFeed();
            });
        });

        function updateFeed() {
            if (selectedInterests.size === 0) {
                feed.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">🤔</div>
                        <p>Select your interests above to see relevant news!</p>
                    </div>
                `;
                return;
            }

            let html = '';
            selectedInterests.forEach(category => {
                newsData[category].forEach(item => {
                    html += `
                        <div class="news-item">
                            <h3>${item.title}</h3>
                            <p>${item.content}</p>
                            <span class="category">${item.source}</span>
                        </div>
                    `;
                });
            });

            feed.innerHTML = html;
        }
    </script>
</body>
</html>
