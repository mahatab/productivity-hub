<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer - m2labs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 40px;
        }

        .timer-display {
            font-size: 6rem;
            font-weight: 300;
            margin: 40px 0;
            letter-spacing: 0.05em;
            font-variant-numeric: tabular-nums;
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 12px 24px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 500;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .mode-btn.active {
            background: white;
            color: #667eea;
            border-color: white;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .control-btn {
            padding: 18px 40px;
            border: none;
            background: white;
            color: #667eea;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .control-btn.reset {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
        }

        .session-count {
            margin-top: 30px;
            font-size: 1rem;
            opacity: 0.9;
        }

        .branding {
            margin-top: 40px;
            font-size: 0.9rem;
            opacity: 0.6;
        }

        .branding strong {
            opacity: 1;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .timer-display {
                font-size: 4rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Focus Timer</h1>
        <p class="subtitle">Less noise. More clarity.</p>
        
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="focus">Focus (25m)</button>
            <button class="mode-btn" data-mode="break">Break (5m)</button>
            <button class="mode-btn" data-mode="long">Long Break (15m)</button>
        </div>

        <div class="timer-display" id="timer">25:00</div>

        <div class="controls">
            <button class="control-btn" id="startBtn">Start</button>
            <button class="control-btn reset" id="resetBtn">Reset</button>
        </div>

        <div class="session-count" id="sessions">Sessions completed: 0</div>

        <div class="branding">
            <strong>m2labs</strong> · Simplifying the complex
        </div>
    </div>

    <script>
        const modes = {
            focus: 25 * 60,
            break: 5 * 60,
            long: 15 * 60
        };

        let currentMode = 'focus';
        let timeLeft = modes.focus;
        let isRunning = false;
        let intervalId = null;
        let sessionsCompleted = 0;

        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const sessionsDisplay = document.getElementById('sessions');
        const modeBtns = document.querySelectorAll('.mode-btn');

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function startTimer() {
            if (isRunning) {
                // Pause
                isRunning = false;
                clearInterval(intervalId);
                startBtn.textContent = 'Resume';
            } else {
                // Start/Resume
                isRunning = true;
                startBtn.textContent = 'Pause';
                
                intervalId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();

                    if (timeLeft === 0) {
                        clearInterval(intervalId);
                        isRunning = false;
                        startBtn.textContent = 'Start';
                        
                        if (currentMode === 'focus') {
                            sessionsCompleted++;
                            sessionsDisplay.textContent = `Sessions completed: ${sessionsCompleted}`;
                        }
                        
                        // Play notification sound (browser beep)
                        const audio = new AudioContext();
                        const oscillator = audio.createOscillator();
                        const gainNode = audio.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(audio.destination);
                        
                        oscillator.frequency.value = 800;
                        gainNode.gain.value = 0.3;
                        
                        oscillator.start();
                        setTimeout(() => oscillator.stop(), 200);
                        
                        alert(`${currentMode.charAt(0).toUpperCase() + currentMode.slice(1)} session complete!`);
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(intervalId);
            isRunning = false;
            timeLeft = modes[currentMode];
            updateDisplay();
            startBtn.textContent = 'Start';
        }

        function switchMode(mode) {
            currentMode = mode;
            resetTimer();
            
            modeBtns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        startBtn.addEventListener('click', startTimer);
        resetBtn.addEventListener('click', resetTimer);
        modeBtns.forEach(btn => {
            btn.addEventListener('click', (e) => switchMode(btn.dataset.mode));
        });

        updateDisplay();
    </script>
</body>
</html>
