<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Notepad - m2labs Prototype</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .window {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            width: 900px;
            max-width: 100%;
            height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Title Bar */
        .titlebar {
            background: #f6f6f6;
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-bottom: 1px solid #d0d0d0;
        }
        
        .traffic-lights {
            display: flex;
            gap: 8px;
            margin-right: 15px;
        }
        
        .traffic-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ddd;
        }
        
        .traffic-light.red { background: #ff5f56; }
        .traffic-light.yellow { background: #ffbd2e; }
        .traffic-light.green { background: #27c93f; }
        
        .window-title {
            flex: 1;
            text-align: center;
            font-size: 13px;
            color: #666;
        }
        
        /* Tab Bar */
        .tab-bar {
            display: flex;
            background: #f6f6f6;
            border-bottom: 1px solid #d0d0d0;
            overflow-x: auto;
        }
        
        .tab {
            padding: 8px 20px;
            background: #e8e8e8;
            border-right: 1px solid #d0d0d0;
            cursor: pointer;
            font-size: 13px;
            color: #333;
            white-space: nowrap;
            min-width: 120px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .tab.active {
            background: white;
            color: #000;
        }
        
        .tab:hover:not(.active) {
            background: #ddd;
        }
        
        .tab-close {
            margin-left: 10px;
            color: #999;
            font-weight: bold;
        }
        
        .tab-close:hover {
            color: #333;
        }
        
        .new-tab {
            padding: 8px 15px;
            background: #f6f6f6;
            cursor: pointer;
            font-size: 16px;
            color: #666;
        }
        
        .new-tab:hover {
            color: #000;
        }
        
        /* Editor Area */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .editor {
            flex: 1;
            padding: 20px;
            border: none;
            outline: none;
            resize: none;
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            background: white;
        }
        
        /* AI Panel */
        .ai-panel {
            background: #f9f9f9;
            border-top: 1px solid #e0e0e0;
            padding: 15px;
            display: none;
        }
        
        .ai-panel.active {
            display: block;
        }
        
        .ai-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .ai-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }
        
        .ai-input:focus {
            border-color: #007AFF;
        }
        
        .ai-btn {
            padding: 8px 16px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }
        
        .ai-btn:hover {
            background: #0051D5;
        }
        
        .ai-btn.secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .ai-btn.secondary:hover {
            background: #e0e0e0;
        }
        
        /* Status Bar */
        .status-bar {
            background: #f6f6f6;
            border-top: 1px solid #d0d0d0;
            padding: 6px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #666;
        }
        
        .status-left {
            display: flex;
            gap: 20px;
        }
        
        .ai-toggle {
            cursor: pointer;
            color: #007AFF;
            font-weight: 500;
        }
        
        .ai-toggle:hover {
            text-decoration: underline;
        }
        
        /* Toolbar */
        .toolbar {
            background: #f9f9f9;
            border-bottom: 1px solid #e0e0e0;
            padding: 8px 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .toolbar-btn {
            padding: 6px 12px;
            background: white;
            border: 1px solid #d0d0d0;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            color: #333;
        }
        
        .toolbar-btn:hover {
            background: #f0f0f0;
        }
        
        .divider {
            width: 1px;
            height: 20px;
            background: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="window">
        <!-- Title Bar -->
        <div class="titlebar">
            <div class="traffic-lights">
                <div class="traffic-light red"></div>
                <div class="traffic-light yellow"></div>
                <div class="traffic-light green"></div>
            </div>
            <div class="window-title">Untitled 1</div>
        </div>
        
        <!-- Tab Bar -->
        <div class="tab-bar">
            <div class="tab active">
                <span>Untitled 1</span>
                <span class="tab-close">×</span>
            </div>
            <div class="tab">
                <span>Ideas.txt</span>
                <span class="tab-close">×</span>
            </div>
            <div class="tab">
                <span>Notes.txt</span>
                <span class="tab-close">×</span>
            </div>
            <div class="new-tab">+</div>
        </div>
        
        <!-- Toolbar -->
        <div class="toolbar">
            <button class="toolbar-btn">📄 New</button>
            <button class="toolbar-btn">📂 Open</button>
            <button class="toolbar-btn">💾 Save</button>
            <div class="divider"></div>
            <button class="toolbar-btn">✂️ Cut</button>
            <button class="toolbar-btn">📋 Copy</button>
            <button class="toolbar-btn">📌 Paste</button>
            <div class="divider"></div>
            <button class="toolbar-btn">🔍 Find</button>
        </div>
        
        <!-- Editor -->
        <div class="editor-container">
            <textarea class="editor" placeholder="Start typing..." spellcheck="true">Welcome to AI Notepad!

This is a prototype of a minimalist text editor with:
- Horizontal tabs for easy multitasking
- Built-in spell checking
- AI-powered text generation and rephrasing
- Local-only storage (your files, your privacy)
- Clean, distraction-free interface

Try it out:
1. Click "✨ AI Assistant" below to toggle AI features
2. Type a prompt like "Write a short poem about coding"
3. Or select text and click "Rephrase" to rewrite it

No subscriptions. No cloud. Just you and your words.</textarea>
        </div>
        
        <!-- AI Panel -->
        <div class="ai-panel" id="aiPanel">
            <div class="ai-controls">
                <input type="text" class="ai-input" placeholder="Enter AI prompt (e.g., 'Write a haiku about coffee')">
                <button class="ai-btn">Generate</button>
                <button class="ai-btn secondary">Rephrase Selection</button>
                <button class="ai-btn secondary" onclick="document.getElementById('aiPanel').classList.remove('active')">Close</button>
            </div>
            <div style="font-size: 11px; color: #666; margin-top: 8px;">
                💡 <strong>AI Features:</strong> Generate text from prompts or rephrase selected text. Uses your OpenAI/Anthropic API key (configured in Settings).
            </div>
        </div>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-left">
                <span>Lines: 23</span>
                <span>Words: 142</span>
                <span>Chars: 867</span>
                <span>✅ Saved</span>
            </div>
            <div>
                <span class="ai-toggle" onclick="document.getElementById('aiPanel').classList.toggle('active')">✨ AI Assistant</span>
            </div>
        </div>
    </div>

    <script>
        // Simple tab switching demo
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                if (e.target.classList.contains('tab-close')) {
                    tab.remove();
                    return;
                }
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelector('.window-title').textContent = tab.textContent.replace('×', '').trim();
            });
        });

        // New tab button
        document.querySelector('.new-tab').addEventListener('click', () => {
            const newTab = document.createElement('div');
            newTab.className = 'tab';
            newTab.innerHTML = '<span>Untitled</span><span class="tab-close">×</span>';
            document.querySelector('.tab-bar').insertBefore(newTab, document.querySelector('.new-tab'));
            tabs.forEach(t => t.classList.remove('active'));
            newTab.classList.add('active');
        });

        // Word count update
        const editor = document.querySelector('.editor');
        editor.addEventListener('input', () => {
            const text = editor.value;
            const lines = text.split('\n').length;
            const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
            const chars = text.length;
            
            const statusLeft = document.querySelector('.status-left');
            statusLeft.innerHTML = `
                <span>Lines: ${lines}</span>
                <span>Words: ${words}</span>
                <span>Chars: ${chars}</span>
                <span>📝 Unsaved</span>
            `;
        });
    </script>
</body>
</html>
