<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer - m2labs Daily Idea</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        .tagline {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        .timer {
            font-size: 6rem;
            font-weight: 300;
            margin: 2rem 0;
            letter-spacing: 0.1em;
            font-variant-numeric: tabular-nums;
        }
        .task-input {
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.9);
            text-align: center;
        }
        .button {
            padding: 1rem 3rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 0.5rem;
        }
        .btn-start {
            background: #4CAF50;
            color: white;
        }
        .btn-pause {
            background: #FF9800;
            color: white;
        }
        .btn-reset {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .stats {
            margin-top: 2rem;
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Focus Timer</h1>
        <p class="tagline">One task. Pure focus. No distractions.</p>
        
        <input type="text" class="task-input" id="taskInput" placeholder="What are you working on?">
        
        <div class="timer" id="timer">25:00</div>
        
        <div class="controls">
            <button class="button btn-start" id="startBtn">Start</button>
            <button class="button btn-pause" id="pauseBtn" style="display:none;">Pause</button>
            <button class="button btn-reset" id="resetBtn">Reset</button>
        </div>
        
        <div class="stats">
            <p>✅ Sessions completed today: <span id="sessionCount">0</span></p>
        </div>
        
        <div class="footer">
            <p>m2labs daily idea • Feb 2, 2026</p>
            <p style="font-size: 0.8rem; margin-top: 0.5rem;">Less noise. More clarity.</p>
        </div>
    </div>

    <script>
        let timeLeft = 25 * 60; // 25 minutes in seconds
        let isRunning = false;
        let interval = null;
        let sessions = parseInt(localStorage.getItem('sessionsToday') || '0');
        
        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const sessionCount = document.getElementById('sessionCount');
        const taskInput = document.getElementById('taskInput');
        
        // Load task from localStorage
        taskInput.value = localStorage.getItem('currentTask') || '';
        sessionCount.textContent = sessions;
        
        // Save task on input
        taskInput.addEventListener('input', () => {
            localStorage.setItem('currentTask', taskInput.value);
        });
        
        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                startBtn.style.display = 'none';
                pauseBtn.style.display = 'inline-block';
                
                interval = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    
                    if (timeLeft === 0) {
                        completeSession();
                    }
                }, 1000);
            }
        }
        
        function pauseTimer() {
            isRunning = false;
            clearInterval(interval);
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
        }
        
        function resetTimer() {
            pauseTimer();
            timeLeft = 25 * 60;
            updateDisplay();
        }
        
        function completeSession() {
            pauseTimer();
            sessions++;
            localStorage.setItem('sessionsToday', sessions);
            sessionCount.textContent = sessions;
            alert('🎉 Focus session complete! Great work!');
            resetTimer();
        }
        
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        
        // Reset session count at midnight
        const lastDate = localStorage.getItem('lastDate');
        const today = new Date().toDateString();
        if (lastDate !== today) {
            localStorage.setItem('sessionsToday', '0');
            localStorage.setItem('lastDate', today);
            sessions = 0;
            sessionCount.textContent = '0';
        }
    </script>
</body>
</html>
